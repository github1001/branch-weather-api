spring.application.name=branch-api-integration-test

spring.datasource.url=${TEST_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=TESTDB_INTEGRATION;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:branchapi}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.sql.init.mode=never

# Keep the real MSSQL datasource during @DataJpaTest
spring.test.database.replace=NONE

logging.level.com.logan.branchapi=DEBUG
